<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buyer Dashboard — HSI Marketplace</title>
  <meta name="theme-color" content="#14532d" />
  <link rel="manifest" href="../manifest.json" />
  <link rel="apple-touch-icon" href="../icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="HSI Market" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --green-nav: #14532d; --green-accent: #16a34a; --green-hover: #15803d; }
    .nav-bg { background-color: var(--green-nav); }
    .btn-primary { background-color: var(--green-accent); }
    .btn-primary:hover { background-color: var(--green-hover); }
    #toast-container { position: fixed; bottom: 1.5rem; right: 1rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
    .toast { padding: 0.75rem 1.25rem; border-radius: 0.5rem; color: white; font-size: 0.875rem; max-width: 320px; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .tab-btn.active { background-color: #16a34a; color: white; }
    .status-pending { background:#fef3c7;color:#92400e; }
    .status-payment_uploaded { background:#dbeafe;color:#1e40af; }
    .status-payment_verified { background:#e0e7ff;color:#3730a3; }
    .status-processing { background:#ffedd5;color:#9a3412; }
    .status-completed { background:#dcfce7;color:#166534; }
    .status-cancelled { background:#fee2e2;color:#991b1b; }
  </style>
</head>
<body class="bg-green-50 text-gray-800 font-sans">

<div id="toast-container"></div>

<!-- AUTH GUARD -->
<script>
  const SUPABASE_URL = 'https://emwhyzrrzifxuizkrqua.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtd2h5enJyemlmeHVpemtycXVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMDU0MTUsImV4cCI6MjA5NDg4MTQxNX0.vBlw_gEGlT1Asac523-iIEXJI9l4bGRJxSoyEExuhUc';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let currentUser = null;
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = '../'; return; }
    const { data: profile } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
    if (!profile || profile.role !== 'buyer') { window.location.href = '../'; return; }
    currentUser = { ...session.user, ...profile };
    document.getElementById('user-name').textContent = profile.full_name || session.user.email;
    initBuyerApp();
  })();
</script>

<!-- NAV -->
<nav class="nav-bg text-white sticky top-0 z-40 shadow-lg">
  <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
    <a href="../" class="flex items-center gap-2 font-bold">
      <img src="../applogo.png" alt="HSI" class="w-7 h-7 rounded" onerror="this.style.display='none'" />
      <span>HSI Marketplace</span>
    </a>
    <div class="flex items-center gap-3">
      <span id="user-name" class="text-green-200 text-sm hidden sm:inline"></span>
      <button onclick="doLogout()" class="bg-green-800 hover:bg-green-700 text-sm px-3 py-1.5 rounded-full transition">Logout</button>
    </div>
  </div>
</nav>

<div class="max-w-4xl mx-auto px-4 py-6">
  <h1 class="text-2xl font-bold text-green-900 mb-6">Buyer Dashboard</h1>

  <!-- TABS -->
  <div class="flex border border-green-200 rounded-xl overflow-hidden mb-6">
    <button onclick="switchTab('cart')" id="tab-cart" class="tab-btn active flex-1 py-2.5 text-sm font-semibold transition">🛒 Cart</button>
    <button onclick="switchTab('orders')" id="tab-orders" class="tab-btn flex-1 py-2.5 text-sm font-semibold bg-white text-green-700 transition">📦 Orders</button>
    <button onclick="switchTab('profile')" id="tab-profile" class="tab-btn flex-1 py-2.5 text-sm font-semibold bg-white text-green-700 transition">👤 Profile</button>
  </div>

  <!-- CART TAB -->
  <div id="panel-cart">
    <div id="cart-list" class="space-y-3 mb-4">
      <p class="text-gray-400 text-sm text-center py-8">Loading cart…</p>
    </div>
    <div id="cart-summary" class="hidden bg-white rounded-xl p-5 shadow border border-green-100">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Delivery Notes (optional)</label>
        <textarea id="delivery-notes" rows="2" placeholder="Any special instructions…"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-green-500"></textarea>
      </div>
      <div class="flex items-center justify-between mt-4">
        <div>
          <p class="text-sm text-gray-500">Total</p>
          <p id="cart-total" class="text-2xl font-bold text-green-700">₱0.00</p>
        </div>
        <button onclick="placeOrder()" class="btn-primary text-white font-semibold px-8 py-3 rounded-xl transition">Place Order</button>
      </div>
    </div>
  </div>

  <!-- ORDERS TAB -->
  <div id="panel-orders" class="hidden">
    <div id="orders-list" class="space-y-4">
      <p class="text-gray-400 text-sm text-center py-8">Loading orders…</p>
    </div>
  </div>

  <!-- PROFILE TAB -->
  <div id="panel-profile" class="hidden">
    <div class="bg-white rounded-xl p-6 shadow border border-green-100">
      <h3 class="text-lg font-bold text-green-900 mb-4">Edit Profile</h3>
      <form onsubmit="saveProfile(event)" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
          <input type="text" id="profile-name" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-green-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
          <input type="tel" id="profile-phone" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-green-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" id="profile-email" disabled class="w-full border border-gray-200 bg-gray-50 rounded-lg px-4 py-2.5 text-sm text-gray-500" />
        </div>
        <button type="submit" class="btn-primary text-white font-semibold px-6 py-2.5 rounded-lg transition">Save Changes</button>
      </form>
      <hr class="my-6 border-green-100" />
      <button onclick="doLogout()" class="w-full bg-red-50 text-red-600 hover:bg-red-100 font-medium py-2.5 rounded-lg transition text-sm">Logout</button>
    </div>
  </div>
</div>

<!-- PAYMENT MODAL -->
<div id="payment-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-black bg-opacity-50" onclick="closePaymentModal()"></div>
  <div class="relative bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl">
    <button onclick="closePaymentModal()" class="absolute top-3 right-4 text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
    <h3 class="text-xl font-bold text-green-900 mb-4">Upload Payment Proof</h3>
    <form onsubmit="submitPayment(event)" class="space-y-4">
      <input type="hidden" id="pay-order-id" />
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Payment Method</label>
        <select id="pay-method" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-green-500">
          <option value="GCash">GCash</option>
          <option value="Maya">Maya</option>
          <option value="Bank Transfer">Bank Transfer</option>
          <option value="Cash on Delivery">Cash on Delivery</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Payment Screenshot</label>
        <input type="file" id="pay-proof" accept="image/*" required class="w-full text-sm text-gray-600 file:mr-3 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-green-100 file:text-green-700 file:font-medium hover:file:bg-green-200" />
      </div>
      <button type="submit" class="w-full btn-primary text-white font-semibold py-3 rounded-xl transition">Submit Payment</button>
    </form>
  </div>
</div>

<script>
  function showToast(msg, type = 'success') {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast ${type === 'error' ? 'bg-red-600' : type === 'warning' ? 'bg-amber-500' : 'bg-green-700'}`;
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }

  function switchTab(tab) {
    ['cart','orders','profile'].forEach(t => {
      document.getElementById(`panel-${t}`).classList.toggle('hidden', t !== tab);
      const btn = document.getElementById(`tab-${t}`);
      btn.classList.toggle('active', t === tab);
      btn.classList.toggle('bg-white', t !== tab);
      btn.classList.toggle('text-green-700', t !== tab);
    });
    if (tab === 'orders') loadOrders();
    if (tab === 'profile') loadProfile();
  }

  async function initBuyerApp() { loadCart(); }

  // ---- CART ----
  async function loadCart() {
    const { data: items } = await sb.from('cart_items')
      .select('*, products(id, name, price, unit, quantity, seller_id)')
      .eq('buyer_id', currentUser.id);
    const listEl = document.getElementById('cart-list');
    const summaryEl = document.getElementById('cart-summary');
    if (!items || items.length === 0) {
      listEl.innerHTML = '<div class="text-center py-8"><p class="text-gray-400 text-sm mb-3">Your cart is empty.</p><a href="../marketplace/" class="btn-primary text-white text-sm px-5 py-2 rounded-full transition inline-block">Browse Products</a></div>';
      summaryEl.classList.add('hidden');
      return;
    }
    const total = items.reduce((s, i) => s + (i.quantity * parseFloat(i.products?.price || 0)), 0);
    listEl.innerHTML = items.map(i => `
      <div class="bg-white rounded-xl p-4 shadow border border-green-100 flex items-center gap-4">
        <div class="flex-1 min-w-0">
          <p class="font-semibold text-sm">${i.products?.name}</p>
          <p class="text-xs text-gray-500">₱${parseFloat(i.products?.price).toFixed(2)} / ${i.products?.unit}</p>
        </div>
        <div class="flex items-center border border-green-200 rounded-lg overflow-hidden">
          <button onclick="updateCartQty('${i.id}', ${i.quantity - 1}, ${i.products?.quantity})" class="px-2 py-1 bg-green-50 hover:bg-green-100 font-bold">−</button>
          <span class="px-3 py-1 text-sm font-medium">${i.quantity}</span>
          <button onclick="updateCartQty('${i.id}', ${i.quantity + 1}, ${i.products?.quantity})" class="px-2 py-1 bg-green-50 hover:bg-green-100 font-bold">+</button>
        </div>
        <span class="font-bold text-green-700 text-sm w-20 text-right">₱${(i.quantity * parseFloat(i.products?.price || 0)).toFixed(2)}</span>
        <button onclick="removeCartItem('${i.id}')" class="text-red-400 hover:text-red-600 text-lg ml-1">×</button>
      </div>
    `).join('');
    document.getElementById('cart-total').textContent = `₱${total.toFixed(2)}`;
    summaryEl.classList.remove('hidden');
  }

  async function updateCartQty(itemId, newQty, maxQty) {
    if (newQty < 1) { removeCartItem(itemId); return; }
    if (newQty > maxQty) { showToast('Not enough stock', 'warning'); return; }
    await sb.from('cart_items').update({ quantity: newQty }).eq('id', itemId);
    loadCart();
  }

  async function removeCartItem(itemId) {
    await sb.from('cart_items').delete().eq('id', itemId);
    loadCart();
  }

  async function placeOrder() {
    const { data: items } = await sb.from('cart_items')
      .select('*, products(id, name, price, unit, seller_id, quantity)')
      .eq('buyer_id', currentUser.id);
    if (!items || items.length === 0) { showToast('Cart is empty', 'warning'); return; }

    // Group by seller
    const bySeller = {};
    for (const item of items) {
      const sid = item.products.seller_id;
      if (!bySeller[sid]) bySeller[sid] = [];
      bySeller[sid].push(item);
    }

    const notes = document.getElementById('delivery-notes').value.trim();
    for (const [sellerId, sellerItems] of Object.entries(bySeller)) {
      const total = sellerItems.reduce((s, i) => s + (i.quantity * parseFloat(i.products.price)), 0);
      const { data: order, error: oErr } = await sb.from('orders').insert({
        buyer_id: currentUser.id, seller_id: sellerId,
        total_amount: total, delivery_notes: notes, status: 'pending'
      }).select().single();
      if (oErr) { showToast('Order failed: ' + oErr.message, 'error'); return; }
      const orderItems = sellerItems.map(i => ({
        order_id: order.id, product_id: i.products.id,
        quantity: i.quantity, unit_price: parseFloat(i.products.price)
      }));
      await sb.from('order_items').insert(orderItems);
    }

    await sb.from('cart_items').delete().eq('buyer_id', currentUser.id);
    showToast('Order placed successfully!');
    switchTab('orders');
  }

  // ---- ORDERS ----
  async function loadOrders() {
    const { data: orders } = await sb.from('orders')
      .select('*, profiles!orders_seller_id_fkey(full_name, farm_name), order_items(*, products(name, unit))')
      .eq('buyer_id', currentUser.id)
      .order('created_at', { ascending: false });
    const listEl = document.getElementById('orders-list');
    if (!orders || orders.length === 0) {
      listEl.innerHTML = '<p class="text-gray-400 text-sm text-center py-8">No orders yet.</p>';
      return;
    }
    listEl.innerHTML = orders.map(o => {
      const canUpload = ['pending','payment_uploaded'].includes(o.status);
      const statusClass = `status-${o.status}`;
      return `
        <div class="bg-white rounded-xl p-5 shadow border border-green-100">
          <div class="flex items-start justify-between mb-3">
            <div>
              <p class="font-semibold text-green-900">${o.profiles?.farm_name || o.profiles?.full_name || 'Seller'}</p>
              <p class="text-xs text-gray-400">${new Date(o.created_at).toLocaleString()}</p>
            </div>
            <span class="text-xs font-semibold px-2 py-1 rounded-full ${statusClass}">${o.status.replace('_',' ').toUpperCase()}</span>
          </div>
          <div class="space-y-1 mb-3">
            ${(o.order_items || []).map(i => `
              <div class="flex justify-between text-sm text-gray-600">
                <span>${i.products?.name} × ${i.quantity} ${i.products?.unit}</span>
                <span>₱${(i.quantity * i.unit_price).toFixed(2)}</span>
              </div>
            `).join('')}
          </div>
          <div class="flex items-center justify-between border-t border-green-50 pt-3">
            <span class="font-bold text-green-700">₱${parseFloat(o.total_amount).toFixed(2)}</span>
            ${canUpload ? `<button onclick="openPaymentModal('${o.id}')" class="btn-primary text-white text-sm px-4 py-1.5 rounded-full transition">Upload Payment</button>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  function openPaymentModal(orderId) {
    document.getElementById('pay-order-id').value = orderId;
    document.getElementById('payment-modal').classList.remove('hidden');
  }
  function closePaymentModal() {
    document.getElementById('payment-modal').classList.add('hidden');
  }

  async function submitPayment(e) {
    e.preventDefault();
    const orderId = document.getElementById('pay-order-id').value;
    const method = document.getElementById('pay-method').value;
    const file = document.getElementById('pay-proof').files[0];
    if (!file) return;

    const path = `${currentUser.id}/${orderId}/${Date.now()}-${file.name}`;
    const { error: upErr } = await sb.storage.from('payment-proofs').upload(path, file);
    if (upErr) { showToast('Upload failed: ' + upErr.message, 'error'); return; }
    const { data: { publicUrl } } = sb.storage.from('payment-proofs').getPublicUrl(path);

    await sb.from('payments').insert({
      order_id: orderId, buyer_id: currentUser.id,
      method, proof_url: publicUrl, status: 'pending'
    });
    await sb.from('orders').update({ status: 'payment_uploaded' }).eq('id', orderId);

    showToast('Payment submitted!');
    closePaymentModal();
    loadOrders();
  }

  // ---- PROFILE ----
  async function loadProfile() {
    const { data: p } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
    if (!p) return;
    document.getElementById('profile-name').value = p.full_name || '';
    document.getElementById('profile-phone').value = p.phone || '';
    document.getElementById('profile-email').value = p.email || currentUser.email;
  }

  async function saveProfile(e) {
    e.preventDefault();
    const { error } = await sb.from('profiles').update({
      full_name: document.getElementById('profile-name').value.trim(),
      phone: document.getElementById('profile-phone').value.trim()
    }).eq('id', currentUser.id);
    if (error) showToast('Save failed', 'error');
    else showToast('Profile updated!');
  }

  async function doLogout() {
    await sb.auth.signOut();
    window.location.href = '../';
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('../sw.js').catch(() => {});
  }
</script>
</body>
</html>
