<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse — HSI Marketplace</title>
  <meta name="theme-color" content="#1b75bc" />
  <link rel="manifest" href="../manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32.png?v=3" />
  <link rel="icon" type="image/png" sizes="192x192" href="../icon-192.png?v=3" />
  <link rel="apple-touch-icon" href="../apple-touch-icon.png?v=3" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="HSI Market" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: {
      brand: { blue:'#1b75bc', bluedark:'#11537f', bluelight:'#e8f3fb', green:'#56b947', greendark:'#3c8a30', greenlight:'#eef8e8', yellow:'#cfdb2e' },
      green: { 50:'#f1f9ee',100:'#dcf0d3',200:'#bce3aa',300:'#95d27c',400:'#74c455',500:'#56b947',600:'#46a338',700:'#3c8a30',800:'#336f29',900:'#285a22' }
    }}}}
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../auth-modal.js" defer></script>
  <script src="../translations.js?v=111"></script>
  <style>
    :root { --accent-green: #46a338; --accent-green-hover: #3c8a30; }
    .nav-bg { background: linear-gradient(90deg,#11537f 0%,#1b75bc 100%); }
    .btn-primary { background-image: linear-gradient(to right, #56b947, #3c8a30); background-color: transparent; }
    .btn-primary:hover { background-image: linear-gradient(to right, #3c8a30, #56b947); }
    .card-hover { transition: transform 0.2s, box-shadow 0.2s; }
    .card-hover:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.12); }
    #toast-container { position: fixed; bottom: 1.5rem; right: 1rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
    .toast { padding: 0.75rem 1.25rem; border-radius: 0.5rem; color: white; font-size: 0.875rem; max-width: 320px; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .category-pill { background-color: #e5e7eb; color: #374151; }
    .category-pill.active { background-image: linear-gradient(to right, #1b75bc, #11537f); background-color: transparent; color: white; }
    .category-pill.active:hover { background-image: linear-gradient(to right, #11537f, #1b75bc); }
    .category-pill:hover:not(.active) { background-color: #e8f3fb; color: #11537f; }
    .modal-overlay { transition: opacity 0.2s; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

<div id="toast-container"></div>

<!-- NAV -->
<nav id="site-nav" class="bg-white text-gray-800 sticky top-0 z-40 shadow-md border-b border-gray-100">
  <div class="max-w-7xl mx-auto px-3 sm:px-6 lg:px-8 py-3 sm:py-4 flex flex-nowrap sm:flex-wrap items-center justify-between gap-1.5 sm:gap-2">
    <div class="flex items-center gap-2 sm:gap-4 min-w-0">
      <a href="../" class="flex items-center gap-2 font-bold text-sm sm:text-lg tracking-wide shrink-0">
        <img src="../assets/hsi-logo.png" alt="HSI Marketplace" class="hidden sm:block h-10 w-auto" onerror="this.style.display='none'" />
        <span class="text-3xl font-black tracking-wide bg-gradient-to-r from-brand-blue to-brand-green bg-clip-text text-transparent">HSI</span>
      </a>
      <a href="../" class="hidden md:inline text-gray-600 hover:text-brand-blue text-sm font-medium transition" data-i18n="nav.home">Home</a>
      <a href="../about/" class="hidden md:inline text-gray-600 hover:text-brand-blue text-sm font-medium transition" data-i18n="nav.about">About</a>
      <a href="../activities/" class="hidden md:inline text-gray-600 hover:text-brand-blue text-sm font-medium transition" data-i18n="nav.activities">Activities</a>
      <a href="../partners/" class="hidden md:inline text-gray-600 hover:text-brand-blue text-sm font-medium transition" data-i18n="nav.partners">Partners</a>
    </div>
    <div class="flex items-center justify-end gap-1.5 sm:gap-3 shrink-0 sm:flex-wrap">
      <!-- LOGIN (shown when logged out) -->
      <button id="nav-auth-btn" onclick="openAuth()" class="bg-gradient-to-r from-brand-blue to-brand-green hover:from-brand-bluedark hover:to-brand-greendark text-white text-sm px-4 py-1.5 rounded-full font-bold transition" data-i18n="nav.login_register">Login / Register</button>
      <!-- PORTAL (shown when logged in — visible by default; marketplace/app.js hides for logged-out users) -->
      <a id="nav-portal-btn" href="../buyer/" class="bg-gradient-to-r from-brand-blue to-brand-bluedark hover:from-brand-bluedark hover:to-brand-blue text-white text-sm px-4 py-1.5 rounded-full font-semibold transition">Buyer Portal</a>
      <!-- SHOP -->
      <a id="nav-shop-btn" href="./" class="btn-primary text-white p-2 rounded-full transition" aria-label="Shop" title="Shop"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007zM8.625 10.5a.375.375 0 11-.75 0 .375.375 0 01.75 0zm7.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/></svg></a>
      <!-- CART (inline drawer — marketplace/app.js relies on toggleCart()) -->
      <button id="nav-cart-btn" onclick="toggleCart()" class="hidden relative btn-primary p-2 rounded-full text-white" aria-label="Cart" title="Cart">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M2.25 2.25a.75.75 0 000 1.5h1.386c.17 0 .318.114.362.278l2.558 9.592a3.752 3.752 0 00-2.806 3.63c0 .414.336.75.75.75h15.75a.75.75 0 000-1.5H5.378A2.25 2.25 0 017.5 15h11.218a.75.75 0 00.674-.421 60.358 60.358 0 002.96-7.228.75.75 0 00-.525-.965A60.864 60.864 0 005.68 4.509l-.232-.867A1.875 1.875 0 003.636 2.25H2.25zM3.75 20.25a1.5 1.5 0 113 0 1.5 1.5 0 01-3 0zM16.5 20.25a1.5 1.5 0 113 0 1.5 1.5 0 01-3 0z"/></svg>
        <span id="cart-badge" class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-xs font-bold w-5 h-5 rounded-full flex items-center justify-center">0</span>
      </button>
      <!-- USER MENU (shown when logged in) -->
      <div id="nav-user-menu" class="hidden relative">
        <button id="nav-user-btn" onclick="toggleUserMenu()" class="btn-primary text-white p-2 rounded-full transition" aria-label="My Account" title="My Account">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
        </button>
        <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-56 bg-white rounded-xl shadow-xl border border-brand-bluelight py-2 z-50 text-gray-700">
          <button onclick="goToProfile()" class="w-full text-left px-4 py-2.5 text-sm hover:bg-brand-bluelight flex items-center gap-2.5 font-medium">
            <svg class="w-4 h-4 text-brand-blue" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <span data-i18n="nav.my_profile">My Profile</span>
          </button>
          <a href="../" class="w-full text-left px-4 py-2.5 text-sm hover:bg-brand-bluelight flex items-center gap-2.5 font-medium">
            <svg class="w-4 h-4 text-brand-blue" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            <span data-i18n="nav.home">Home</span>
          </a>
          <div class="border-t border-gray-100 my-1"></div>
          <button onclick="doLogout()" class="w-full text-left px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 font-medium" data-i18n="nav.logout">Logout</button>
        </div>
      </div>
      <button onclick="toggleMobileMenu()" class="md:hidden text-brand-bluedark p-1 sm:p-2 -mr-1 shrink-0" aria-label="Open menu">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
  </div>
  <!-- MOBILE MENU -->
  <div id="mobile-menu" class="hidden md:hidden absolute left-0 right-0 top-full border-t border-gray-100 bg-white px-4 py-3 space-y-1 shadow-lg z-40">
    <a href="../" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-700 font-medium hover:bg-brand-bluelight"><svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/></svg><span data-i18n="nav.home">Home</span></a>
    <a href="../about/" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-700 font-medium hover:bg-brand-bluelight"><svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z"/></svg><span data-i18n="nav.about">About</span></a>
    <a href="../activities/" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-700 font-medium hover:bg-brand-bluelight"><svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 00-2.456 2.456z"/></svg><span data-i18n="nav.activities">Activities</span></a>
    <a href="../partners/" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-700 font-medium hover:bg-brand-bluelight"><svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/></svg><span data-i18n="nav.partners">Partners</span></a>
    <a href="../contact/" id="mobile-contact-btn" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-700 font-medium hover:bg-brand-bluelight"><svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg><span>Contact Us</span></a>
    <button onclick="toggleLang()" class="flex items-center gap-3 w-full text-left px-3 py-2 rounded-lg text-gray-700 font-medium hover:bg-brand-bluelight" data-i18n-skip="1"><svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 21l5.25-11.25L21 21m-9-3h7.5M3 5.621a48.474 48.474 0 016-.371m0 0c1.12 0 2.233.038 3.334.114M9 5.25V3m3.334 2.364C11.176 10.658 7.69 15.08 3 17.502m9.334-12.138c.896.061 1.785.147 2.666.257m-4.589 8.495a18.023 18.023 0 01-3.827-5.802"/></svg><span data-i18n="nav.lang_toggle_label">Bahasa / English</span></button>
  </div>
</nav>

<!-- SEARCH + CATEGORY PILLS (sticky just below nav) -->
<div class="bg-white border-b border-gray-100 sticky top-[57px] sm:top-[65px] z-30">
  <div class="max-w-6xl mx-auto px-4 py-2">
    <input id="search-input" type="search" placeholder="Search produce…" data-i18n-placeholder="nav.search" oninput="filterProducts()"
      class="block w-full max-w-2xl mx-auto bg-gray-100 placeholder-gray-400 text-gray-800 rounded-full px-4 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-blue" />
  </div>
  <div class="max-w-6xl mx-auto px-4 py-2 flex gap-2 overflow-x-auto">
    <button onclick="setCategory('All')" class="category-pill active shrink-0 px-4 py-1 rounded-full text-sm font-medium transition">All</button>
    <button onclick="setCategory('Vegetables')" class="category-pill shrink-0 px-4 py-1 rounded-full text-sm font-medium transition">Vegetables</button>
    <button onclick="setCategory('Fruits')" class="category-pill shrink-0 px-4 py-1 rounded-full text-sm font-medium transition">Fruits</button>
    <button onclick="setCategory('Herbs')" class="category-pill shrink-0 px-4 py-1 rounded-full text-sm font-medium transition">Herbs</button>
    <button onclick="setCategory('Other')" class="category-pill shrink-0 px-4 py-1 rounded-full text-sm font-medium transition">Other</button>
  </div>
</div>

<!-- PRODUCT GRID -->
<main class="max-w-6xl mx-auto px-4 py-8">
  <div id="product-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
    <div class="col-span-full text-center text-gray-400 py-16">Loading products…</div>
  </div>
</main>

<!-- PRODUCT DETAIL MODAL -->
<div id="product-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="modal-overlay absolute inset-0 bg-black bg-opacity-50" onclick="closeModal()"></div>
  <div class="relative bg-white rounded-2xl w-full max-w-lg max-h-screen overflow-y-auto shadow-2xl">
    <button onclick="closeModal()" class="absolute top-3 right-3 text-gray-400 hover:text-gray-600 text-2xl z-10">&times;</button>
    <div id="modal-image-wrap" class="h-56 bg-green-100 rounded-t-2xl overflow-hidden">
      <img id="modal-image" src="" alt="" class="w-full h-full object-cover" />
    </div>
    <div class="p-6">
      <h2 id="modal-name" class="text-2xl font-bold text-green-900 mb-1"></h2>
      <p id="modal-desc" class="text-gray-600 text-sm mb-4"></p>
      <div class="flex items-center justify-between mb-4">
        <span id="modal-price" class="text-green-700 font-bold text-xl"></span>
        <span id="modal-harvest" class="text-xs text-gray-400"></span>
      </div>
      <div class="flex items-center gap-3 mb-5">
        <label class="text-sm font-medium text-gray-700">Qty:</label>
        <div class="flex items-center border border-green-300 rounded-lg overflow-hidden">
          <button onclick="changeQty(-1)" class="px-3 py-1.5 bg-green-50 hover:bg-green-100 font-bold text-lg">−</button>
          <input id="modal-qty" type="number" value="1" min="1" class="w-16 text-center py-1.5 text-sm focus:outline-none" />
          <button onclick="changeQty(1)" class="px-3 py-1.5 bg-green-50 hover:bg-green-100 font-bold text-lg">+</button>
        </div>
        <span id="modal-available" class="text-xs text-gray-400"></span>
      </div>
      <button onclick="addToCart()" class="w-full btn-primary text-white font-semibold py-3 rounded-xl transition mb-5">Add to Cart</button>

      <!-- Seller card -->
      <div id="modal-seller-card" class="hidden bg-green-50 rounded-xl p-4 border border-green-100">
        <p class="text-xs font-semibold text-green-700 uppercase tracking-wide mb-3">About the Farmer</p>
        <div class="flex items-start gap-3">
          <button type="button" onclick="openFarmerModal()" title="View farmer profile" class="w-14 h-14 rounded-full bg-green-200 overflow-hidden shrink-0 flex items-center justify-center ring-2 ring-transparent hover:ring-green-400 transition cursor-pointer">
            <span id="modal-seller-placeholder" class="text-2xl"></span>
            <img id="modal-seller-photo" src="" alt="" class="hidden w-full h-full object-cover" />
          </button>
          <div class="flex-1 min-w-0">
            <button type="button" onclick="openFarmerModal()" class="font-semibold text-gray-800 text-sm hover:text-green-700 transition text-left"><span id="modal-seller-name"></span></button>
            <p id="modal-seller-rating" class="hidden text-xs mt-0.5"></p>
            <p id="modal-seller-meta" class="text-xs text-gray-500 mt-0.5"></p>
            <div id="modal-seller-badges" class="flex flex-wrap gap-1 mt-1.5"></div>
            <button type="button" onclick="openFarmerModal()" class="text-xs text-green-600 hover:text-green-800 font-medium mt-1.5">View farmer profile →</button>
          </div>
        </div>
        <p id="modal-seller-story" class="hidden text-xs text-gray-600 mt-3 italic leading-relaxed border-t border-green-100 pt-3"></p>
      </div>
    </div>
  </div>
</div>

<!-- FARMER PROFILE MODAL -->
<div id="farmer-modal" class="hidden fixed inset-0 z-[60] flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-black bg-opacity-60" onclick="closeFarmerModal()"></div>
  <div class="relative bg-white rounded-2xl w-full max-w-md max-h-screen overflow-y-auto shadow-2xl">
    <button onclick="closeFarmerModal()" class="absolute top-3 right-3 text-white hover:text-gray-200 text-3xl z-10 leading-none">&times;</button>
    <!-- Header -->
    <div class="bg-gradient-to-br from-green-800 to-green-600 px-6 pt-8 pb-12 text-center">
      <div class="w-28 h-28 mx-auto rounded-full bg-green-200 overflow-hidden flex items-center justify-center ring-4 ring-white/40 shadow-lg">
        <span id="farmer-placeholder" class="text-5xl"></span>
        <img id="farmer-photo" src="" alt="" class="hidden w-full h-full object-cover" />
      </div>
    </div>
    <div class="px-6 pb-6 -mt-6">
      <div class="bg-white rounded-xl text-center mb-4">
        <h2 id="farmer-name" class="text-xl font-bold text-green-900"></h2>
        <p id="farmer-farm" class="text-sm text-green-600 font-medium"></p>
        <p id="farmer-rating" class="hidden text-sm mt-1"></p>
        <p id="farmer-location" class="text-xs text-gray-500 mt-0.5"></p>
      </div>

      <!-- Stat chips -->
      <div id="farmer-stats" class="grid grid-cols-3 gap-2 mb-4"></div>

      <!-- Certifications -->
      <div id="farmer-certs-wrap" class="hidden mb-4">
        <p class="text-xs font-semibold text-green-700 uppercase tracking-wide mb-2">Certifications & Awards</p>
        <div id="farmer-certs" class="flex flex-wrap gap-1.5"></div>
      </div>

      <!-- Story -->
      <div id="farmer-story-wrap" class="hidden">
        <p class="text-xs font-semibold text-green-700 uppercase tracking-wide mb-2">My Farming Story</p>
        <p id="farmer-story" class="text-sm text-gray-600 leading-relaxed italic"></p>
      </div>
    </div>
  </div>
</div>

<!-- REVIEWS MODAL -->
<div id="reviews-modal" class="hidden fixed inset-0 z-[70] flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-black bg-opacity-60" onclick="closeReviewsModal()"></div>
  <div class="relative bg-white rounded-2xl w-full max-w-md max-h-[85vh] overflow-y-auto shadow-2xl">
    <div class="sticky top-0 bg-white border-b border-green-100 px-5 py-4 flex items-center justify-between">
      <h3 class="text-lg font-bold text-green-900">Buyer Ratings</h3>
      <button onclick="closeReviewsModal()" class="text-gray-400 hover:text-gray-600 text-3xl leading-none">&times;</button>
    </div>
    <div id="reviews-summary" class="px-5 pt-4"></div>
    <div id="reviews-list" class="px-5 pb-5 pt-3 space-y-3">
      <p class="text-gray-400 text-sm text-center py-8">Loading…</p>
    </div>
  </div>
</div>

<!-- CART SIDEBAR -->
<div id="cart-overlay" class="hidden fixed inset-0 bg-black bg-opacity-30 z-40" onclick="toggleCart()"></div>
<div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full max-w-sm bg-white z-50 shadow-2xl transform translate-x-full transition-transform overflow-y-auto">
  <div class="p-5">
    <div class="flex items-center justify-between mb-5">
      <h3 class="text-xl font-bold text-green-900">Your Cart</h3>
      <button onclick="toggleCart()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
    </div>
    <div id="cart-items-list">
      <p class="text-gray-400 text-sm text-center py-10">Your cart is empty.</p>
    </div>
    <div id="cart-footer" class="hidden border-t border-green-100 pt-4 mt-4">
      <div class="flex justify-between font-bold text-green-900 mb-4">
        <span>Total</span>
        <span id="cart-total">RM 0.00</span>
      </div>
      <a href="../buyer/?cart=open" class="block w-full btn-primary text-white font-semibold py-3 rounded-xl text-center transition">Go to Checkout</a>
    </div>
  </div>
</div>

<script src="app.js?v=67" defer></script>
<script>function toggleMobileMenu(){var m=document.getElementById('mobile-menu');if(m)m.classList.toggle('hidden');}</script>
</body>
</html>
